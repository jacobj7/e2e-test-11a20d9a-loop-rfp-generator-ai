<!doctype html>
<html>
<body style="font-family:system-ui;max-width:560px;margin:auto;padding:24px;color:#111">
  <h2>Your plan has been changed, {{first_name}}</h2>
  <p>You've moved from <strong>{{from_tier_name}}</strong> to <strong>{{to_tier_name}}</strong>.</p>
  <p>{{#if proration_amount_cents}}A proration of ${{proration_amount_cents}} has been applied to your next invoice.{{/if}}</p>
  <p><a href="{{manage_url}}" style="display:inline-block;padding:10px 16px;background:#000;color:#fff;text-decoration:none;border-radius:4px">View Plan Details</a></p>
</body>
</html>
