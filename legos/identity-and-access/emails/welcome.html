<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="font-family:sans-serif;color:#111;max-width:600px;margin:0 auto;padding:24px">
  <h1 style="font-size:24px;margin-bottom:8px">Welcome, {{first_name}}!</h1>
  <p>Your account is ready. Sign in to get started.</p>
  <p style="margin:24px 0">
    <a href="{{login_url}}"
       style="background:#0f172a;color:#fff;padding:12px 24px;text-decoration:none;border-radius:6px;font-weight:600">
      Sign in to your account
    </a>
  </p>
  <p style="color:#6b7280;font-size:13px">
    If you did not create this account, you can safely ignore this email.
  </p>
</body>
</html>
