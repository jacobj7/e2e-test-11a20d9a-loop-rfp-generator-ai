<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="font-family:sans-serif;color:#111;max-width:600px;margin:0 auto;padding:24px">
  <h1 style="font-size:24px;margin-bottom:8px">Reset your password, {{first_name}}</h1>
  <p>We received a request to reset your password. Click the button below to set a new one.</p>
  <p style="margin:24px 0">
    <a href="{{reset_url}}"
       style="background:#dc2626;color:#fff;padding:12px 24px;text-decoration:none;border-radius:6px;font-weight:600">
      Reset password
    </a>
  </p>
  <p style="color:#6b7280;font-size:13px">This link expires in <strong>{{expires_in}}</strong>.</p>
  <p style="color:#6b7280;font-size:13px">
    If you did not request a password reset, ignore this email — your password will not change.
  </p>
</body>
</html>
